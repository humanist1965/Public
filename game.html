<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peg Solitaire - Browser Edition</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --board-color: #45322e;
            --hole-color: #11111b;
            --peg-color: #f5c2e7;
            --rotation: 0deg;
        }

        body {
            background-color: var(--bg);
            color: #cdd6f4;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            touch-action: none;
            user-select: none;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .board-wrapper {
            perspective: 1000px;
            padding: 40px;
        }

        .board-container {
            background: var(--board-color);
            padding: 30px;
            border-radius: 50%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: rotate(var(--rotation));
        }

        .board {
            display: grid;
            grid-template-columns: repeat(7, 50px);
            grid-template-rows: repeat(7, 50px);
            gap: 12px;
        }

        .cell {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .invalid { visibility: hidden; }

        .hole {
            background: var(--hole-color);
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.8);
        }

        .peg {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #f5e0dc, var(--peg-color), #94e2d5);
            cursor: grab;
            box-shadow: 0 5px 10px rgba(0,0,0,0.4);
            z-index: 10;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .peg:active {
            cursor: grabbing;
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.6);
        }

        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 15px;
        }

        button {
            background: #313244;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover { background: #45475a; }
        button:active { transform: translateY(2px); }

        .hint {
            margin-top: 15px;
            font-size: 0.85rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>English Solitaire</h1>
        <div class="stats-container">
            <span>Pegs Remaining: <span id="peg-count">32</span></span>
        </div>
    </div>

    <div class="board-wrapper">
        <div class="board-container" id="container">
            <div class="board" id="game-board"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="rotateBoard(-90)">↺ Rotate L</button>
        <button onclick="resetGame()">Reset Game</button>
        <button onclick="rotateBoard(90)">Rotate R ↻</button>
    </div>

    <p class="hint">Drag a marble toward a hole to jump!</p>

    <script>
        const INITIAL_STATE = [
            [0, 0, 2, 2, 2, 0, 0],
            [0, 0, 2, 2, 2, 0, 0],
            [2, 2, 2, 2, 2, 2, 2],
            [2, 2, 2, 1, 2, 2, 2],
            [2, 2, 2, 2, 2, 2, 2],
            [0, 0, 2, 2, 2, 0, 0],
            [0, 0, 2, 2, 2, 0, 0],
        ];

        let board = JSON.parse(JSON.stringify(INITIAL_STATE));
        let rotation = 0;
        let dragStart = null;

        function rotateBoard(deg) {
            rotation += deg;
            document.documentElement.style.setProperty('--rotation', rotation + 'deg');
        }

        function render() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';
            let pegs = 0;

            board.forEach((row, r) => {
                row.forEach((cell, c) => {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    
                    if (cell === 0) {
                        div.classList.add('invalid');
                    } else {
                        div.classList.add('hole');
                        if (cell === 2) {
                            pegs++;
                            const peg = document.createElement('div');
                            peg.className = 'peg';
                            peg.onpointerdown = (e) => handleDragStart(e, r, c);
                            div.appendChild(peg);
                        }
                    }
                    boardEl.appendChild(div);
                });
            });
            document.getElementById('peg-count').innerText = pegs;
        }

        function handleDragStart(e, r, c) {
            dragStart = { x: e.clientX, y: e.clientY, r, c };
            window.onpointerup = handleDragEnd;
        }

        function handleDragEnd(e) {
            if (!dragStart) return;

            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            const sensitivity = 30;

            // Convert screen drag to board direction based on current rotation
            const angleRad = (-rotation * Math.PI) / 180;
            const worldDx = dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
            const worldDy = dx * Math.sin(angleRad) + dy * Math.cos(angleRad);

            let dr = 0;
            let dc = 0;

            // Determine if horizontal or vertical swipe is dominant
            if (Math.abs(worldDx) > Math.abs(worldDy)) {
                if (Math.abs(worldDx) > sensitivity) dc = worldDx > 0 ? 2 : -2;
            } else {
                if (Math.abs(worldDy) > sensitivity) dr = worldDy > 0 ? 2 : -2;
            }

            if (dr !== 0 || dc !== 0) {
                attemptMove(dragStart.r, dragStart.c, dragStart.r + dr, dragStart.c + dc);
            }

            dragStart = null;
            window.onpointerup = null;
        }

        function attemptMove(r1, c1, r2, c2) {
            // Check board bounds
            if (r2 < 0 || r2 >= 7 || c2 < 0 || c2 >= 7) return;

            const midR = (r1 + r2) / 2;
            const midC = (c1 + c2) / 2;

            // Must land in empty hole (1) and jump over a peg (2)
            if (board[r2][c2] === 1 && board[midR][midC] === 2) {
                board[r1][c1] = 1;
                board[midR][midC] = 1;
                board[r2][c2] = 2;
                render();
                checkGameOver();
            }
        }

        function checkGameOver() {
            // Check for any possible jumps remaining
            // Simplified: You could add a check here to notify the user if no moves are left
        }

        function resetGame() {
            board = JSON.parse(JSON.stringify(INITIAL_STATE));
            render();
        }

        // Initialize
        render();
    </script>
</body>
</html>
