<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squeeze Now - Pelvic Trainer v0.3</title>
    <style>
        :root {
            --primary-blue: #006699;
            --primary-orange: #f37021;
            --text-dark: #333;
        }

        body {
            margin: 0;
            font-family: -apple-system, sans-serif;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Header & Navigation */
        .header { width: 100%; padding: 15px 0; text-align: center; font-weight: bold; position: relative; }
        .tabs { display: flex; width: 100%; background: #e0e0e0; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #666; }
        .tab.active { 
            background-color: var(--primary-blue); 
            color: white; 
            clip-path: polygon(0% 0%, 90% 0%, 100% 50%, 90% 100%, 0% 100%);
        }

        /* Timer Circle */
        .timer-container { margin-top: 50px; position: relative; width: 250px; height: 250px; }
        svg { transform: rotate(-90deg); }
        .base-circle { fill: none; stroke: #eee; stroke-width: 30; }
        .progress-circle { 
            fill: none; 
            stroke: var(--primary-orange); 
            stroke-width: 30; 
            stroke-dasharray: 660; 
            stroke-dashoffset: 660; 
            transition: stroke-dashoffset 0.1s linear;
        }
        .counter-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; font-weight: bold; }

        #instruction { margin-top: 40px; font-size: 1.8rem; font-weight: bold; color: var(--primary-orange); height: 1.5em; }

        /* Animated Droplet Icon */
        .icon-area { flex-grow: 1; width: 100%; position: relative; display: flex; justify-content: center; }
        #droplet {
            position: absolute; bottom: 80px; width: 50px; height: 70px;
            background-color: var(--primary-orange);
            clip-path: path('M25 0 C10 30 0 45 0 60 A25 25 0 1 0 50 60 C50 45 40 30 25 0');
            transition: transform 1s ease-in-out, background-color 0.3s;
        }

        /* Controls */
        .footer { width: 100%; padding: 20px 0 40px; display: flex; justify-content: space-evenly; }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: #eee; cursor: pointer; font-size: 1.2rem; }
        .btn-main { background: #2b3a67; color: white; }
    </style>
</head>
<body>

    <div class="header">squeeze now</div>

    <div class="tabs">
        <div class="tab active" id="slowTab" onclick="setMode('slow')">slow</div>
        <div class="tab" id="quickTab" onclick="setMode('quick')">quick</div>
        <div class="tab">finish</div>
    </div>

    <div class="timer-container">
        <svg width="250" height="250">
            <circle class="base-circle" cx="125" cy="125" r="105"></circle>
            <circle id="progress" class="progress-circle" cx="125" cy="125" r="105"></circle>
        </svg>
        <div class="counter-text" id="counter">1 of 10</div>
    </div>

    <div id="instruction">ready?</div>

    <div class="icon-area">
        <div id="droplet"></div>
    </div>

    <div class="footer">
        <button class="btn" onclick="appReset()">↺</button>
        <button class="btn">📳</button>
        <button class="btn">🔇</button>
        <button class="btn btn-main" id="playBtn" onclick="togglePlay()">▶</button>
    </div>

    <script>
        const COLORS = { orange: "#f37021", blue: "#006699" };
        let mode = 'slow', isRunning = false, rep = 1, timer = null, timeLeft = 0, total = 0;

        const el = {
            progress: document.getElementById('progress'),
            counter: document.getElementById('counter'),
            instr: document.getElementById('instruction'),
            drop: document.getElementById('droplet'),
            play: document.getElementById('playBtn')
        };

        function setMode(m) { mode = m; appReset(); document.getElementById('slowTab').className = m==='slow'?'tab active':'tab'; document.getElementById('quickTab').className = m==='quick'?'tab active':'tab'; }

        function togglePlay() { 
            isRunning = !isRunning; 
            el.play.innerText = isRunning ? "II" : "▶";
            if (isRunning && !timer) runCycle(); 
        }

        function appReset() {
            clearInterval(timer); timer = null; isRunning = false; rep = 1;
            el.play.innerText = "▶"; updateProgress(1);
            el.instr.innerText = "ready?"; el.instr.style.color = COLORS.orange;
            el.drop.style.transform = "translateY(0)"; el.drop.style.backgroundColor = COLORS.orange;
        }

        function runCycle() {
            if (rep > 10) { alert("Done!"); appReset(); return; }
            const sTime = (mode === 'slow') ? 10 : 1;
            const rTime = (mode === 'slow') ? 4 : 1;

            startPhase(sTime, "squeeze", COLORS.orange, -200, () => {
                startPhase(rTime, "relax", COLORS.blue, 0, () => {
                    rep++; runCycle();
                });
            });
        }

        function startPhase(sec, txt, col, y, cb) {
            timeLeft = total = sec;
            el.instr.innerText = txt; el.instr.style.color = col;
            el.drop.style.backgroundColor = col; el.progress.style.stroke = col;
            el.drop.style.transform = `translateY(${y}px)`;

            timer = setInterval(() => {
                if (!isRunning) return;
                timeLeft -= 0.1;
                updateProgress(timeLeft / total);
                if (timeLeft <= 0) { clearInterval(timer); timer = null; cb(); }
            }, 100);
        }

        function updateProgress(p) {
            el.progress.style.strokeDashoffset = 660 - (p * 660);
            el.counter.innerText = `${rep} of 10`;
        }
    </script>
</body>
</html>
