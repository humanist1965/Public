<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squeeze Now v1.8</title>
    <style>
        :root {
            --primary-blue: #006699;
            --primary-orange: #f37021;
        }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .header { 
            width: 100%; 
            padding: 15px 0; 
            text-align: center; 
            font-weight: bold; 
            font-size: 1.2rem; 
            border-bottom: 1px solid #eee;
        }

        .tabs { display: flex; width: 100%; background: #e0e0e0; z-index: 10; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #555; font-weight: 500; }
        .tab.active { 
            background-color: var(--primary-blue); 
            color: white; 
            clip-path: polygon(0% 0%, 92% 0%, 100% 50%, 92% 100%, 0% 100%);
        }

        /* TIMER BOX */
        .timer-container { margin-top: 40px; position: relative; width: 260px; height: 260px; z-index: 5; }
        
        /* Fixed Clockwise: Start at 12:00 */
        svg { transform: rotate(-90deg); } 

        .base-circle { fill: none; stroke: #eee; stroke-width: 32; }
        
        .progress-segment {
            fill: none;
            stroke-width: 33; /* Slightly thicker to cover background gaps */
            stroke-dasharray: 660; 
            stroke-dashoffset: 660; 
            transition: stroke-dashoffset 0.1s linear;
        }

        /* Quick Mode Background Segments */
        #quickSegments { display: none; }

        .counter-text { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 1.8rem; font-weight: 800; color: #111; 
        }

        #instruction { 
            margin-top: 35px; font-size: 2.2rem; font-weight: bold; 
            color: var(--primary-orange); text-align: center; height: 1.2em; 
        }

        /* DROPLET TRACKING */
        .viewport-track {
            position: absolute;
            top: 450px; 
            bottom: 120px; 
            width: 100%;
            pointer-events: none;
        }

        #droplet {
            position: absolute;
            left: 50%;
            bottom: 0%; 
            width: 60px;
            height: 85px;
            margin-left: -30px; 
            background-color: var(--primary-orange);
            clip-path: path('M30 0 C15 40 0 55 0 75 L60 75 C60 55 45 40 30 0 Z');
            transition: bottom 0.1s linear, background-color 0.4s;
        }

        .footer { 
            width: 100%; 
            padding: 20px 0 40px; 
            display: flex; 
            justify-content: space-evenly; 
            background: white;
            z-index: 10;
            margin-top: auto;
        }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: #f0f0f0; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; }
        .btn-play { background: #23315a; color: white; }
    </style>
</head>
<body>

    <div class="header">squeeze now v1.8</div>

    <div class="tabs">
        <div class="tab active" id="slowTab" onclick="updateMode('slow')">slow</div>
        <div class="tab" id="quickTab" onclick="updateMode('quick')">quick</div>
        <div class="tab">finish</div>
    </div>

    <div class="timer-container">
        <svg width="260" height="260" id="timerSvg">
            <circle class="base-circle" cx="130" cy="130" r="105"></circle>
            <g id="quickSegments"></g>
            
            <circle id="blueProgress" class="progress-segment" cx="130" cy="130" r="105" stroke="#006699"></circle>
            <circle id="orangeProgress" class="progress-segment" cx="130" cy="130" r="105" stroke="#f37021"></circle>
            
            <circle id="quickWipe" class="progress-segment" cx="130" cy="130" r="105" stroke="#eee" style="display:none;"></circle>
        </svg>
        <div class="counter-text" id="counter">1 of 10</div>
    </div>

    <div id="instruction">ready?</div>

    <div class="viewport-track">
        <div id="droplet"></div>
    </div>

    <div class="footer">
        <button class="btn" onclick="killTimer()">↺</button>
        <button class="btn">📳</button>
        <button class="btn">🔇</button>
        <button class="btn btn-play" id="playBtn" onclick="togglePlay()">▶</button>
    </div>

    <script>
        const COLORS = { orange: "#f37021", blue: "#006699" };
        const CIRCUM = 660;

        let mode = 'slow', isRunning = false, currentRep = 1, timer = null, elapsed = 0;

        const ui = {
            orange: document.getElementById('orangeProgress'),
            blue: document.getElementById('blueProgress'),
            quickWipe: document.getElementById('quickWipe'),
            quickG: document.getElementById('quickSegments'),
            counter: document.getElementById('counter'),
            instr: document.getElementById('instruction'),
            drop: document.getElementById('droplet'),
            play: document.getElementById('playBtn')
        };

        // Create 20 static segments for Quick Mode
        function initQuickUI() {
            ui.quickG.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", 130);
                circle.setAttribute("cy", 130);
                circle.setAttribute("r", 105);
                circle.setAttribute("fill", "none");
                circle.setAttribute("stroke-width", 32);
                circle.setAttribute("stroke", i % 2 === 0 ? COLORS.orange : COLORS.blue);
                // Each segment is 1/20th of CIRCUM (33 units)
                circle.setAttribute("stroke-dasharray", `33 ${CIRCUM - 33}`);
                // Rotate each segment into place (18 degrees each)
                circle.setAttribute("transform", `rotate(${i * 18}, 130, 130)`);
                ui.quickG.appendChild(circle);
            }
        }
        initQuickUI();

        function updateMode(m) { 
            mode = m; 
            killTimer();
            document.getElementById('slowTab').className = m === 'slow' ? 'tab active' : 'tab';
            document.getElementById('quickTab').className = m === 'quick' ? 'tab active' : 'tab';
            
            // Toggle UI elements visibility
            ui.quickG.style.display = (m === 'quick') ? 'block' : 'none';
            ui.quickWipe.style.display = (m === 'quick') ? 'block' : 'none';
            ui.orange.style.display = (m === 'slow') ? 'block' : 'none';
            ui.blue.style.display = (m === 'slow') ? 'block' : 'none';
        }

        function togglePlay() {
            isRunning = !isRunning;
            ui.play.innerText = isRunning ? "II" : "▶";
            if (isRunning && !timer) runSession();
        }

        function killTimer() {
            clearInterval(timer); timer = null; isRunning = false; 
            currentRep = 1; elapsed = 0;
            ui.play.innerText = "▶";
            draw(0, 0);
            ui.instr.innerText = "ready?";
            ui.instr.style.color = COLORS.orange;
            ui.drop.style.bottom = "0%";
            ui.drop.style.backgroundColor = COLORS.orange;
        }

        function runSession() {
            if (currentRep > 10 && mode === 'slow') { alert("Slow Session Complete!"); killTimer(); return; }

            elapsed = 0;
            if (timer) clearInterval(timer);

            timer = setInterval(() => {
                if (!isRunning) return;
                elapsed += 0.1;

                if (mode === 'slow') {
                    handleSlowMode();
                } else {
                    handleQuickMode();
                }
            }, 100);
        }

        function handleSlowMode() {
            const squeezeTime = 10;
            const breathTime = 4;
            const total = 14;

            if (elapsed <= squeezeTime) {
                ui.instr.innerText = "squeeze";
                ui.instr.style.color = COLORS.orange;
                ui.drop.style.backgroundColor = COLORS.orange;
                ui.drop.style.bottom = (elapsed / squeezeTime * 100) + "%";
                draw(elapsed / total, 0);
            } else if (elapsed <= total) {
                ui.instr.innerText = "breath";
                ui.instr.style.color = COLORS.blue;
                ui.drop.style.backgroundColor = COLORS.blue;
                ui.drop.style.bottom = (100 - ((elapsed - squeezeTime) / breathTime * 100)) + "%";
                draw(squeezeTime / total, (elapsed - squeezeTime) / total);
            } else {
                currentRep++;
                elapsed = 0;
                if (currentRep > 10) { alert("Slow Session Complete!"); killTimer(); }
            }
        }

        function handleQuickMode() {
            const totalCycle = 20; // 10 pairs of 1s squeeze + 1s breath
            if (elapsed > totalCycle) {
                alert("Quick Session Complete!");
                killTimer();
                return;
            }

            const currentSecond = Math.floor(elapsed);
            const isSqueeze = (currentSecond % 2 === 0);
            const subProgress = elapsed % 1; 

            ui.instr.innerText = isSqueeze ? "squeeze" : "breath";
            ui.instr.style.color = isSqueeze ? COLORS.orange : COLORS.blue;
            ui.drop.style.backgroundColor = isSqueeze ? COLORS.orange : COLORS.blue;

            // Droplet Rise (Squeeze) and Fall (Breath) every 1 second
            if (isSqueeze) {
                ui.drop.style.bottom = (subProgress * 100) + "%";
            } else {
                ui.drop.style.bottom = (100 - (subProgress * 100)) + "%";
            }

            // Circle logic: Wipe reveals the 20 background segments
            // Wipe offset 0 = Everything covered (Grey), 660 = Everything revealed
            const progress = elapsed / totalCycle;
            ui.quickWipe.style.strokeDashoffset = (progress * CIRCUM);
            
            // Rep count for Quick mode: updates every 2 seconds
            ui.counter.innerText = (Math.floor(currentSecond / 2) + 1) + " of 10";
        }

        function draw(orangeRatio, blueRatio) {
            ui.orange.style.strokeDashoffset = CIRCUM - (orangeRatio * CIRCUM);
            ui.blue.style.strokeDashoffset = CIRCUM - ((orangeRatio + blueRatio) * CIRCUM);
            ui.counter.innerText = `${currentRep} of 10`;
        }

        // Initialize display
        updateMode('slow');
    </script>
</body>
</html>
