<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squeeze Now v1.7</title>
    <style>
        :root {
            --primary-blue: #006699;
            --primary-orange: #f37021;
        }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .header { 
            width: 100%; 
            padding: 15px 0; 
            text-align: center; 
            font-weight: bold; 
            font-size: 1.2rem; 
            border-bottom: 1px solid #eee;
        }

        .tabs { display: flex; width: 100%; background: #e0e0e0; z-index: 10; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #555; font-weight: 500; }
        .tab.active { 
            background-color: var(--primary-blue); 
            color: white; 
            clip-path: polygon(0% 0%, 92% 0%, 100% 50%, 92% 100%, 0% 100%);
        }

        /* TIMER BOX */
        .timer-container { margin-top: 40px; position: relative; width: 260px; height: 260px; z-index: 5; }
        svg { transform: rotate(-90deg); } 
        .base-circle { fill: none; stroke: #eee; stroke-width: 32; }
        .progress-segment {
            fill: none;
            stroke-width: 32;
            stroke-dasharray: 660; 
            stroke-dashoffset: 660; 
            transition: stroke-dashoffset 0.1s linear;
        }

        .counter-text { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 1.8rem; font-weight: 800; color: #111; 
        }

        #instruction { 
            margin-top: 35px; font-size: 2.2rem; font-weight: bold; 
            color: var(--primary-orange); text-align: center; height: 1.2em; 
        }

        /* DROPLET TRACKING v1.7 */
        .viewport-track {
            position: absolute;
            top: 450px; /* Below the circle/instruction text */
            bottom: 120px; /* Above the footer */
            width: 100%;
            pointer-events: none;
        }

        #droplet {
            position: absolute;
            left: 50%;
            bottom: 0%; /* Start at the bottom of the track */
            width: 60px;
            height: 85px;
            margin-left: -30px; /* Center horizontally */
            background-color: var(--primary-orange);
            clip-path: path('M30 0 C15 40 0 55 0 75 L60 75 C60 55 45 40 30 0 Z');
            /* Transition is linear to match the timer progress */
            transition: bottom 0.1s linear, background-color 0.4s;
        }

        .footer { 
            width: 100%; 
            padding: 20px 0 40px; 
            display: flex; 
            justify-content: space-evenly; 
            background: white;
            z-index: 10;
            margin-top: auto;
        }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: #f0f0f0; cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; }
        .btn-play { background: #23315a; color: white; }
    </style>
</head>
<body>

    <div class="header">squeeze now v1.7</div>

    <div class="tabs">
        <div class="tab active" id="slowTab" onclick="updateMode('slow')">slow</div>
        <div class="tab" id="quickTab" onclick="updateMode('quick')">quick</div>
        <div class="tab">finish</div>
    </div>

    <div class="timer-container">
        <svg width="260" height="260">
            <circle class="base-circle" cx="130" cy="130" r="105"></circle>
            <circle id="blueProgress" class="progress-segment" cx="130" cy="130" r="105" stroke="#006699"></circle>
            <circle id="orangeProgress" class="progress-segment" cx="130" cy="130" r="105" stroke="#f37021"></circle>
        </svg>
        <div class="counter-text" id="counter">1 of 10</div>
    </div>

    <div id="instruction">ready?</div>

    <div class="viewport-track">
        <div id="droplet"></div>
    </div>

    <div class="footer">
        <button class="btn" onclick="killTimer()">↺</button>
        <button class="btn">📳</button>
        <button class="btn">🔇</button>
        <button class="btn btn-play" id="playBtn" onclick="togglePlay()">▶</button>
    </div>

    <script>
        const COLORS = { orange: "#f37021", blue: "#006699" };
        const CIRCUM = 660;

        let mode = 'slow', isRunning = false, currentRep = 1, timer = null, elapsed = 0;

        const ui = {
            orange: document.getElementById('orangeProgress'),
            blue: document.getElementById('blueProgress'),
            counter: document.getElementById('counter'),
            instr: document.getElementById('instruction'),
            drop: document.getElementById('droplet'),
            play: document.getElementById('playBtn')
        };

        function updateMode(m) { 
            mode = m; 
            killTimer();
            document.getElementById('slowTab').className = m === 'slow' ? 'tab active' : 'tab';
            document.getElementById('quickTab').className = m === 'quick' ? 'tab active' : 'tab';
        }

        function togglePlay() {
            isRunning = !isRunning;
            ui.play.innerText = isRunning ? "II" : "▶";
            if (isRunning && !timer) runSession();
        }

        function killTimer() {
            clearInterval(timer); timer = null; isRunning = false; 
            currentRep = 1; elapsed = 0;
            ui.play.innerText = "▶";
            draw(0, 0);
            ui.instr.innerText = "ready?";
            ui.instr.style.color = COLORS.orange;
            ui.drop.style.bottom = "0%";
            ui.drop.style.backgroundColor = COLORS.orange;
        }

        function runSession() {
            if (currentRep > 10) { alert("Session Complete!"); killTimer(); return; }

            const squeezeTime = (mode === 'slow') ? 10 : 1;
            const breathTime = (mode === 'slow') ? 4 : 1;
            const totalCycle = squeezeTime + breathTime;
            
            elapsed = 0;

            timer = setInterval(() => {
                if (!isRunning) return;
                elapsed += 0.1; // 100ms updates for smoother movement
                
                if (elapsed <= squeezeTime) {
                    // SQUEEZE PHASE
                    ui.instr.innerText = "squeeze";
                    ui.instr.style.color = COLORS.orange;
                    ui.drop.style.backgroundColor = COLORS.orange;
                    
                    // Slow rise: 0% to 100% over the squeezeTime
                    const risePercent = (elapsed / squeezeTime) * 100;
                    ui.drop.style.bottom = risePercent + "%";
                    
                    draw(elapsed / totalCycle, 0);

                } else if (elapsed <= totalCycle) {
                    // BREATH PHASE
                    ui.instr.innerText = "breath";
                    ui.instr.style.color = COLORS.blue;
                    ui.drop.style.backgroundColor = COLORS.blue;
                    
                    // Slow fall: 100% down to 0% over the breathTime
                    const breathElapsed = elapsed - squeezeTime;
                    const fallPercent = 100 - ((breathElapsed / breathTime) * 100);
                    ui.drop.style.bottom = fallPercent + "%";
                    
                    const orangeRatio = squeezeTime / totalCycle;
                    const breathRatio = (elapsed - squeezeTime) / totalCycle;
                    draw(orangeRatio, breathRatio);

                } else {
                    // END OF CYCLE
                    clearInterval(timer); timer = null;
                    currentRep++;
                    runSession();
                }
            }, 100);
        }

        function draw(orangeRatio, blueRatio) {
            ui.orange.style.strokeDashoffset = CIRCUM - (orangeRatio * CIRCUM);
            const totalRatio = orangeRatio + blueRatio;
            ui.blue.style.strokeDashoffset = CIRCUM - (totalRatio * CIRCUM);
            ui.counter.innerText = `${currentRep} of 10`;
        }

        draw(0, 0);
    </script>
</body>
</html>
